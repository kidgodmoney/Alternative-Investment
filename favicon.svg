<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13121e"/>
      <stop offset="100%" stop-color="#0d0c18"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Bar chart: 3 rising bars -->
  <rect x="4"  y="20" width="6" height="8"  rx="1.5" fill="url(#g)"  opacity="0.55"/>
  <rect x="13" y="13" width="6" height="15" rx="1.5" fill="url(#g)"  opacity="0.75"/>
  <rect x="22" y="6"  width="6" height="22" rx="1.5" fill="url(#g2)"/>

  <!-- Subtle upward trend line -->
  <polyline
    points="7,19 16,12 25,5"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.35"
  />
  <!-- Dot at tip -->
  <circle cx="25" cy="5" r="1.5" fill="#ffffff" opacity="0.5"/>
</svg>
