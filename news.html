<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대체투자 뉴스피드 — Alternative Investment News</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #09090f;
      --bg-2:      #111118;
      --bg-3:      #18181f;
      --ink:       #e2e2f0;
      --ink-2:     #6b6b90;
      --ink-3:     #3a3a55;
      --border:    rgba(255,255,255,0.06);
      --border-2:  rgba(255,255,255,0.11);
      --accent:    #a78bfa;
      --accent-2:  #60a5fa;
      --accent-dk: #7c3aed;
      --accent-lt: rgba(167,139,250,0.10);
      --gradient:  linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      --r: 12px; --r-sm: 8px; --r-lg: 16px;

      --paper-warm: #111118; --paper: #18181f; --paper-dark: #0d0d14;
      --navy: #1a1a28; --navy-lt: rgba(167,139,250,0.08);
      --rule: rgba(255,255,255,0.07); --rule-dark: rgba(255,255,255,0.12);
      --ink-muted: #6b6b90; --ink-light: #4a4a68;
      --gold: #a78bfa; --teal: #60a5fa;
      --glow-blue: 0 0 20px rgba(167,139,250,0.15);
      --glow-sm: 0 2px 12px rgba(167,139,250,0.10);
      --radius: 12px; --radius-sm: 8px;
      --sans:  "Pretendard Variable", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      --serif: "Pretendard Variable", "Pretendard", system-ui, sans-serif;
      --mono:  "JetBrains Mono", "Noto Sans Mono", monospace;
    }
    [data-theme="light"] {
      --bg: #f8f8ff; --bg-2: #f0f0fa; --bg-3: #e8e8f5;
      --ink: #0f0f1a; --ink-2: #5a5a78; --ink-3: #a0a0c0;
      --border: rgba(0,0,0,0.07); --border-2: rgba(0,0,0,0.12);
      --accent: #7c3aed; --accent-2: #2563eb; --accent-dk: #5b21b6;
      --accent-lt: rgba(124,58,237,0.08);
      --paper-warm: #f0f0fa; --paper: #e8e8f5; --paper-dark: #e0e0f0;
      --rule: rgba(0,0,0,0.07); --rule-dark: rgba(0,0,0,0.13);
      --ink-muted: #5a5a78; --ink-light: #7070a0;
      --navy: #ebebff; --navy-lt: rgba(124,58,237,0.06);
    }
    [data-theme="light"] .masthead { background: rgba(248,248,255,0.92); }
    [data-theme="light"] .blob { opacity: 0.08; }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans); background: var(--bg); color: var(--ink);
      line-height: 1.6; font-size: 14px; min-height: 100dvh;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.25s, color 0.25s;
    }

    /* ── BLOBS ── */
    .blob { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.20; animation: blob 8s infinite ease-in-out; pointer-events: none; z-index: -1; }
    .blob-1 { width: 600px; height: 600px; background: var(--accent);   top: -180px; left: -80px;  animation-delay: 0s; }
    .blob-2 { width: 500px; height: 500px; background: var(--accent-2); bottom: -130px; right: -80px; animation-delay: 3s; }
    @keyframes blob { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-50px) scale(1.08)} 66%{transform:translate(-20px,20px) scale(0.94)} }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }

    /* ── MASTHEAD ── */
    .masthead { background: rgba(9,9,15,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-2); transition: background 0.25s; }
    .masthead::before { content: ""; display: block; height: 2px; background: var(--gradient); opacity: 0.65; }
    .masthead-top { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 2.5rem; border-bottom: 1px solid var(--border); }
    .issue-info { font-size: 11px; letter-spacing: 0.03em; color: var(--ink-2); }
    .page-nav { display: flex; gap: 0.3rem; align-items: center; }
    .page-nav a { font-size: 11px; font-weight: 500; text-decoration: none; padding: 0.3rem 0.8rem; border-radius: var(--r-sm); border: 1px solid transparent; color: var(--ink-2); transition: all 0.15s; }
    .page-nav a:hover { color: var(--ink); background: var(--border); }
    .page-nav a.current { background: var(--accent-lt); color: var(--accent); border-color: rgba(167,139,250,0.25); font-weight: 600; }
    .page-nav a:active { transform: translateY(1px); }
    .theme-btn { background: none; border: 1px solid var(--border-2); color: var(--ink-2); font-size: 14px; padding: 0.25rem 0.6rem; border-radius: var(--r-sm); cursor: pointer; transition: all 0.15s; line-height: 1; }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .theme-btn:active { transform: translateY(1px); }
    .masthead-title { text-align: center; padding: 1rem 2rem 0.85rem; }
    .magazine-name { font-size: clamp(1.1rem, 2.4vw, 1.7rem); font-weight: 800; letter-spacing: -0.01em; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .magazine-name span { -webkit-text-fill-color: transparent; }
    .magazine-tagline { font-size: 11px; letter-spacing: 0.04em; color: var(--ink-2); margin-top: 0.3rem; }
    .masthead-nav { border-top: 1px solid var(--border); }
    .field-tags { display: flex; overflow-x: auto; scrollbar-width: none; align-items: center; }
    .field-tags::-webkit-scrollbar { display: none; }
    .field-tag { font-size: 11px; font-weight: 500; color: var(--ink-2); cursor: pointer; text-decoration: none; transition: all 0.15s; padding: 0.7rem 1.2rem; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
    .field-tag:hover { color: var(--ink); background: var(--border); }
    .field-tag.active { color: var(--accent); border-bottom-color: var(--accent); }
    .field-tag:active { opacity: 0.75; }

    /* ── FEED TOGGLE ── */
    .feed-toggle { display: flex; gap: 0.3rem; margin-left: auto; padding: 0.4rem 1rem; flex-shrink: 0; }
    .feed-toggle-btn { font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-2); background: transparent; color: var(--ink-2); padding: 0.28rem 0.75rem; border-radius: var(--r-sm); transition: all 0.12s; white-space: nowrap; }
    .feed-toggle-btn:hover { color: var(--ink); background: var(--border); }
    .feed-toggle-btn.active { background: var(--accent-lt); color: var(--accent); border-color: rgba(167,139,250,0.25); }
    .feed-toggle-btn:active { transform: translateY(1px); }

    /* ── TICKER ── */
    .ticker-wrap { overflow: hidden; border-bottom: 1px solid var(--border); background: rgba(167,139,250,0.04); height: 34px; display: flex; align-items: center; }
    .ticker-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); padding: 0 1.1rem; white-space: nowrap; border-right: 1px solid var(--border-2); flex-shrink: 0; z-index: 2; }
    .ticker-body  { position: relative; flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
    .ticker-body::before { content: ''; position: absolute; left: 0; top: 0; width: 60px; height: 100%; background: linear-gradient(to right, var(--bg-2, #111118) 30%, transparent); z-index: 1; pointer-events: none; }
    .ticker-body::after  { content: ''; position: absolute; right: 0; top: 0; width: 60px; height: 100%; background: linear-gradient(to left,  var(--bg-2, #111118) 30%, transparent); z-index: 1; pointer-events: none; }
    .ticker-track { display: flex; animation: ticker 80s linear infinite; white-space: nowrap; }
    .ticker-item  { font-size: 11px; color: var(--ink-2); padding: 0 2rem; transition: color 0.12s; }
    .ticker-item:hover { color: var(--ink); }
    @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    /* ── SKELETON ── */
    .loading-text { font-size: 11px; letter-spacing: 0.05em; color: var(--ink-2); padding: 3rem 0; text-align: center; }
    .skeleton-screen { padding: 2rem 0; }
    .sk-block { background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-2) 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite linear; border-radius: 6px; }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
    .sk-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
    .sk-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--r); padding: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; min-height: 180px; }
    .sk-line{height:14px} .sk-line-lg{height:26px} .sk-line-sm{height:10px}
    .sk-w-80{width:80%}   .sk-w-60{width:60%}    .sk-w-40{width:40%}

    /* ── NEWS LAYOUT ── */
    .news-section { padding: 2rem 0; }
    .news-grid     { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 2rem; }
    .news-featured { display: grid; grid-template-columns: 3fr 2fr; gap: 1rem; margin-bottom: 2rem; }
    .news-card {
      background: rgba(255,255,255,0.03); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .news-card:hover { transform: translateY(-3px); border-color: rgba(167,139,250,0.28); box-shadow: 0 8px 28px rgba(167,139,250,0.09); }
    .news-card:active { transform: translateY(0); opacity: 0.9; }
    .news-card-source { font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
    .news-card-title  { font-size: 13px; font-weight: 700; line-height: 1.45; color: var(--ink); flex: 1; letter-spacing: -0.01em; }
    .news-card-time   { font-size: 10px; color: var(--ink-2); margin-top: auto; }
    .source-badge { font-size: 8px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 4px; background: var(--accent-lt); color: var(--accent); display: inline-block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    /* ── CATEGORY COLORS ── */
    .alt-pe  { --c: #a78bfa; } .alt-re  { --c: #60a5fa; }
    .alt-inf { --c: #34d399; } .alt-hf  { --c: #fb923c; } .alt-vc  { --c: #f472b6; }
    .field-tag--alt.active, .field-tag--alt:hover { color: var(--c, var(--accent)); }

    /* ── SECTORS ── */
    .sector-tile {
      background: rgba(255,255,255,0.03); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 1rem; display: flex; flex-direction: column; align-items: flex-start; gap: 0.3rem;
      cursor: pointer; transition: all 0.15s;
    }
    .sector-tile:hover  { border-color: rgba(167,139,250,0.3); background: var(--accent-lt); transform: translateY(-2px); }
    .sector-tile:active { transform: translateY(0); opacity: 0.85; }
    .sector-tile.active { border-color: var(--accent); background: var(--accent-lt); }
    .sector-icon { font-size: 1.2rem; }
    .sector-name { font-size: 12px; font-weight: 700; color: var(--ink); }
    .sector-en   { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); }

    /* Section labels */
    .section-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; }
    .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border-2); }
    .section-meta { font-size: 10px; letter-spacing: 0.04em; color: var(--ink-2); }
    .cat-hero-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.6rem; display: block; }
    .cat-hero-title { font-size: clamp(1.2rem, 2.5vw, 1.7rem); font-weight: 800; letter-spacing: -0.02em; color: var(--ink); line-height: 1.25; }
    .error-state { text-align: center; padding: 4rem 2rem; color: var(--ink-2); }
    .error-state h3 { font-size: 1.2rem; font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; }

    /* ── FOOTER ── */
    .site-footer  { border-top: 1px solid var(--border); padding: 2rem 0; margin-top: 2rem; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .footer-note  { font-size: 11px; color: var(--ink-3); }
    .footer-name  { font-size: 11px; font-weight: 600; color: var(--ink-2); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-link  { font-size: 11px; color: var(--ink-2); text-decoration: none; transition: color 0.12s; }
    .footer-link:hover { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .news-grid { grid-template-columns: repeat(2,1fr); }
      .news-featured { grid-template-columns: 1fr; }
      .sectors-strip { grid-template-columns: repeat(3,1fr); }
      .sk-grid { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 640px) {
      .container { padding: 0 1rem; }
      .masthead-top { display: none; }
      .news-grid { grid-template-columns: 1fr; }
      .sectors-strip { grid-template-columns: repeat(2,1fr); }
      .sk-grid { grid-template-columns: 1fr; }
    }

    /* ── MISSING CLASSES (JS-rendered) ── */
    .loading-screen { display: flex; align-items: center; justify-content: center; height: 60vh; flex-direction: column; gap: 1rem; }
    .loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border-2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.5rem; }

    /* Cat hero glass panel */
    .cat-hero { padding: 2rem 0 0; }
    .cat-hero-inner { display: flex; align-items: flex-start; gap: 2rem; flex-wrap: wrap; }
    .cat-hero-info { flex: 1; min-width: 260px; }
    .cat-hero-desc { font-size: 14px; line-height: 1.72; color: var(--ink-2); margin-top: 0.6rem; max-width: 50ch; }

    /* Featured news */
    .news-featured-body {
      background: rgba(255,255,255,0.03); backdrop-filter: blur(16px);
      border: 1px solid var(--border-2); border-radius: var(--r-lg);
      padding: 2rem; display: flex; flex-direction: column; gap: 0.8rem;
    }
    .news-featured-side {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: var(--r); padding: 1.4rem;
      display: flex; flex-direction: column; gap: 0.8rem;
    }
    .news-featured-title {
      font-size: 1.25rem; font-weight: 800; line-height: 1.35; letter-spacing: -0.02em;
      color: var(--ink); text-decoration: none; transition: color 0.15s; display: block;
    }
    .news-featured-title:hover { color: var(--accent); }
    .news-featured-desc { font-size: 14px; line-height: 1.72; color: var(--ink-2); }
    .news-meta { display: flex; align-items: center; gap: 1rem; font-size: 11px; color: var(--ink-2); margin-top: auto; flex-wrap: wrap; }
    .news-source-tag { display: flex; align-items: center; gap: 0.5rem; }
    .news-source-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* Side items */
    .news-side-item { padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
    .news-side-item:last-child { border-bottom: none; padding-bottom: 0; }
    .news-side-title { font-size: 12.5px; font-weight: 600; line-height: 1.45; color: var(--ink-2); text-decoration: none; display: block; transition: color 0.12s; }
    .news-side-title:hover { color: var(--ink); }
    .news-side-meta { font-size: 10px; color: var(--ink-3); margin-top: 0.3rem; }

    /* News card variants */
    .news-card-num { font-family: var(--mono); font-size: 9px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; }
    .news-card-title { font-size: 13px; font-weight: 700; line-height: 1.45; color: var(--ink); text-decoration: none; flex: 1; display: block; transition: color 0.12s; }
    .news-card-title:hover { color: var(--accent); }
    .news-card-desc { font-size: 11.5px; line-height: 1.6; color: var(--ink-2); }
    .news-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-top: auto; padding-top: 0.6rem; border-top: 1px solid var(--border); font-size: 10px; color: var(--ink-2); }
    .news-card-footer > span:last-child { white-space: nowrap; flex-shrink: 0; }
    .news-card-source { display: flex; align-items: center; gap: 0.4rem; font-size: 9.5px; font-weight: 600; color: var(--accent); }
    .source-reddit { background: rgba(255,87,0,0.12); color: #ff5700; }
    .source-google { background: rgba(96,165,250,0.12); color: var(--accent-2); }

    /* Sectors */
    .sectors-strip { padding: 2rem 0; border-top: 1px solid var(--border); margin-top: 2rem; }
    .sectors-grid  { display: grid; grid-template-columns: repeat(5,1fr); gap: 0.75rem; margin-top: 1rem; }
    .active-tile   { border-color: rgba(167,139,250,0.35); background: var(--accent-lt); }

    @media (max-width: 768px) {
      .cat-hero-inner { flex-direction: column; }
      .news-featured { grid-template-columns: 1fr; }
      .sectors-grid { grid-template-columns: repeat(3,1fr); }
    }
    @media (max-width: 480px) {
      .sectors-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>

</head>
<body>

<!-- MASTHEAD -->
<header class="masthead">
  <div class="masthead-top container">
    <div class="issue-info" id="issue-info">뉴스 피드 로딩 중...</div>
    <nav class="page-nav">
      <a href="index.html">리서치 논문</a>
      <a class="current" href="news.html">뉴스 피드</a>
      <a href="social.html">SNS 인사이트</a>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="테마 변경">☀</button>
    </nav>
  </div>
  <div class="masthead-title">
    <div class="magazine-name">대체투자 <span>뉴스피드</span></div>
    <div class="magazine-tagline">Live intelligence across private equity, real assets, and venture</div>
  </div>
  <div class="masthead-nav">
    <nav class="field-tags container">
      <a class="field-tag field-tag--alt active" data-cat="alt.PE" href="#">사모펀드</a>
      <a class="field-tag field-tag--alt" data-cat="alt.RE" href="#">부동산</a>
      <a class="field-tag field-tag--alt" data-cat="alt.INF" href="#">인프라</a>
      <a class="field-tag field-tag--alt" data-cat="alt.HF" href="#">헤지펀드</a>
      <a class="field-tag field-tag--alt" data-cat="alt.VC" href="#">벤처캐피탈</a>
      <div class="feed-toggle">
        <button class="feed-toggle-btn active" id="btn-global" onclick="setMode('global')">🌏 글로벌</button>
        <button class="feed-toggle-btn" id="btn-ko" onclick="setMode('ko')">🇰🇷 국내</button>
      </div>
    </nav>
  </div>
</header>

<!-- TICKER (static placeholder, filled by JS) -->
<div class="ticker-wrap">
  <div class="ticker-label">실시간</div>
  <div class="ticker-body">
    <div class="ticker-track" id="ticker-track">
      <div class="ticker-item"><span>●</span>뉴스 피드 로딩 중...</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="app">
  <div class="skeleton-screen container">
    <div class="sk-grid" style="grid-template-columns: 3fr 2fr; min-height: 220px;">
      <div class="sk-card"><div class="sk-block sk-line-sm sk-w-40"></div><div class="sk-block sk-line-lg sk-w-80"></div><div class="sk-block sk-line sk-w-60"></div><div class="sk-block sk-line sk-w-80"></div></div>
      <div class="sk-card"><div class="sk-block sk-line sk-w-60"></div><div class="sk-block sk-line sk-w-80"></div><div class="sk-block sk-line sk-w-40"></div></div>
    </div>

// ── RSS PROXY (rss2json — 안정적, JSON 직접 반환) ────────────────────────────
const RSS2JSON_API = 'https://api.rss2json.com/v1/api.json?rss_url=';

async function fetchFeed(feedUrl, label) {
  try {
    const res = await fetch(RSS2JSON_API + encodeURIComponent(feedUrl));
    if (!res.ok) { console.warn('[RSS] rss2json error:', res.status, feedUrl); return []; }
    const json = await res.json();
    if (json.status !== 'ok') { console.warn('[RSS] rss2json status:', json.message, feedUrl); return []; }
    return (json.items || []).map(item => ({
      title:   (item.title || '').trim(),
      link:    item.link || item.guid || '#',
      desc:    stripHtml(item.description || item.content || '').slice(0, 280),
      pubDate: item.pubDate || '',
      source:  json.feed?.title || label || feedUrl,
      sourceType: 'rss',
    })).filter(i => i.title);
  } catch (e) {
    console.warn('[RSS] fetch failed:', feedUrl, e.message);
    return [];
  }
}

// ── REDDIT RSS (직접 접근, Atom 포맷) ─────────────────────────────────────────
const REDDIT_FEEDS = {
  'alt.PE':  'https://www.reddit.com/r/privateequity+investing+finance/.rss?limit=15',
  'alt.RE':  'https://www.reddit.com/r/realestateinvesting+RealEstate/.rss?limit=15',
  'alt.INF': 'https://www.reddit.com/r/investing+RenewableEnergy+energy/.rss?limit=15',
  'alt.HF':  'https://www.reddit.com/r/algotrading+quant+wallstreetbets/.rss?limit=15',
  'alt.VC':  'https://www.reddit.com/r/startups+venturecapital+Entrepreneur/.rss?limit=15',
};

async function fetchReddit(cat) {
  const url = REDDIT_FEEDS[cat];
  if (!url) return [];
  try {
    const res = await fetch(url, { headers: { 'User-Agent': 'AltInvestMag/1.0' } });
    if (!res.ok) { console.warn('[Reddit] error:', res.status); return []; }
    const xml = new DOMParser().parseFromString(await res.text(), 'application/xml');
    const entries = [...xml.querySelectorAll('entry')];
    return entries.map(e => ({
      title:   (e.querySelector('title')?.textContent || '').trim(),
      link:    e.querySelector('link')?.getAttribute('href') || '#',
      desc:    stripHtml(e.querySelector('content')?.textContent || '').slice(0, 280),
      pubDate: e.querySelector('updated')?.textContent || '',
      source:  'Reddit',
      sourceType: 'reddit',
    })).filter(i => i.title && !i.title.startsWith('r/'));
  } catch (e) {
    console.warn('[Reddit] fetch failed:', e.message);
    return [];
  }
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent.replace(/\s+/g, ' ').trim().slice(0, 280);
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr.slice(0, 16);
  const diff = Date.now() - d.getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1) return `${Math.floor(diff / 60000)}분 전`;
  if (h < 24) return `${h}시간 전`;
  return `${Math.floor(h / 24)}일 전`;
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadCat(cat, mode) {
  currentCat = cat;
  if (mode) currentMode = mode;

  // nav active
  document.querySelectorAll('.field-tag').forEach(t =>
    t.classList.toggle('active', t.dataset.cat === cat)
  );

  const meta = CAT_META[cat];
  const modeLabel = currentMode === 'ko' ? '🇰🇷 국내' : '🌏 글로벌';
  document.getElementById('app').innerHTML = `
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">${meta.title} ${modeLabel} RSS 피드 수신 중...</div>
    </div>`;

  const feedMap = currentMode === 'ko' ? FEEDS_KO : FEEDS;
  const feeds = feedMap[cat] || [];

  // 병렬 로딩 — 실패해도 다른 소스는 정상 표시 (graceful degradation)
  const [rssSettled, redditItems] = await Promise.all([
    Promise.allSettled(feeds.map(f => fetchFeed(f.url, f.label))),
    fetchReddit(cat),
  ]);

  const rssItems = rssSettled
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value);

  // 실패한 피드 수 로그
  const failCount = rssSettled.filter(r => r.status === 'rejected').length;
  if (failCount) console.warn(`[RSS] ${failCount}개 피드 실패 (나머지 정상)`);

  // Merge, keyword-filter, deduplicate by title prefix, sort by date
  const seen = new Set();
  const items = [...rssItems, ...redditItems]
    .filter(item => matchesCategory(item, cat))
    .filter(item => {
      const key = item.title.slice(0, 40).toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .sort((a, b) => {
      const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
      const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
      return db - da;
    });

  allItems = items;
  renderNews(items, cat);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── NAV CLICK ─────────────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const tag = e.target.closest('.field-tag');
  if (!tag || !tag.dataset.cat) return;
  e.preventDefault();
  loadCat(tag.dataset.cat);
});

// ── INIT ─────────────────────────────────────────────────────────────────────
loadCat('alt.PE');
</script>
