<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대체투자 인사이트 — Alternative Investment Research Magazine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Supanova core palette ── */
      --bg:        #09090f;
      --bg-2:      #111118;
      --bg-3:      #18181f;
      --ink:       #e2e2f0;
      --ink-2:     #6b6b90;
      --ink-3:     #3a3a55;
      --border:    rgba(255,255,255,0.06);
      --border-2:  rgba(255,255,255,0.11);
      --accent:    #a78bfa;
      --accent-2:  #60a5fa;
      --accent-dk: #7c3aed;
      --accent-lt: rgba(167,139,250,0.10);
      --gradient:  linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      --r:     12px;
      --r-sm:  8px;
      --r-lg:  16px;

      /* ── Legacy variable aliases (JS inline styles use these) ── */
      --paper-warm:  #111118;
      --paper:       #18181f;
      --paper-dark:  #0d0d14;
      --navy:        #1a1a28;
      --navy-lt:     rgba(167,139,250,0.08);
      --rule:        rgba(255,255,255,0.07);
      --rule-dark:   rgba(255,255,255,0.12);
      --ink-muted:   #6b6b90;
      --ink-light:   #4a4a68;
      --gold:        #a78bfa;
      --teal:        #60a5fa;
      --glow-blue:   0 0 20px rgba(167,139,250,0.15);
      --glow-sm:     0 2px 12px rgba(167,139,250,0.10);
      --radius:      12px;
      --radius-sm:   8px;

      /* ── Fonts ── */
      --sans:  "Pretendard Variable", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      --serif: "Pretendard Variable", "Pretendard", system-ui, sans-serif;
      --mono:  "JetBrains Mono", "Noto Sans Mono", monospace;
    }

    [data-theme="light"] {
      --bg:        #f8f8ff;
      --bg-2:      #f0f0fa;
      --bg-3:      #e8e8f5;
      --ink:       #0f0f1a;
      --ink-2:     #5a5a78;
      --ink-3:     #a0a0c0;
      --border:    rgba(0,0,0,0.07);
      --border-2:  rgba(0,0,0,0.12);
      --accent:    #7c3aed;
      --accent-2:  #2563eb;
      --accent-dk: #5b21b6;
      --accent-lt: rgba(124,58,237,0.08);
      --paper-warm: #f0f0fa;
      --paper:      #e8e8f5;
      --paper-dark: #e0e0f0;
      --rule:       rgba(0,0,0,0.07);
      --rule-dark:  rgba(0,0,0,0.13);
      --ink-muted:  #5a5a78;
      --ink-light:  #7070a0;
      --navy:       #ebebff;
      --navy-lt:    rgba(124,58,237,0.06);
    }
    [data-theme="light"] .masthead       { background: rgba(248,248,255,0.92); }
    [data-theme="light"] .modal-overlay  { background: rgba(15,15,26,0.55); }
    [data-theme="light"] .blob           { opacity: 0.08; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      font-size: 14px;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.25s, color 0.25s;
    }

    /* ── BLOBS ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.20;
      animation: blob 8s infinite ease-in-out;
      pointer-events: none;
      z-index: -1;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--accent);   top: -180px; left: -80px;  animation-delay: 0s; }
    .blob-2 { width: 500px; height: 500px; background: var(--accent-2); bottom: -130px; right: -80px; animation-delay: 3s; }
    @keyframes blob {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-50px) scale(1.08); }
      66%      { transform: translate(-20px,20px) scale(0.94); }
    }

    /* ── CONTAINER ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }

    /* ── MASTHEAD ── */
    .masthead {
      background: rgba(9,9,15,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border-2);
      transition: background 0.25s;
    }
    .masthead::before {
      content: ""; display: block; height: 2px;
      background: var(--gradient); opacity: 0.65;
    }
    .masthead-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .issue-info { font-size: 11px; letter-spacing: 0.03em; color: var(--ink-2); }
    .page-nav { display: flex; gap: 0.3rem; align-items: center; }
    .page-nav a {
      font-size: 11px; font-weight: 500; text-decoration: none;
      padding: 0.3rem 0.8rem; border-radius: var(--r-sm);
      border: 1px solid transparent; color: var(--ink-2); transition: all 0.15s;
    }
    .page-nav a:hover { color: var(--ink); background: var(--border); }
    .page-nav a.current {
      background: var(--accent-lt); color: var(--accent);
      border-color: rgba(167,139,250,0.25); font-weight: 600;
    }
    .page-nav a:active { transform: translateY(1px); }
    .theme-btn {
      background: none; border: 1px solid var(--border-2);
      color: var(--ink-2); font-size: 14px; padding: 0.25rem 0.6rem;
      border-radius: var(--r-sm); cursor: pointer; transition: all 0.15s; line-height: 1;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .theme-btn:active { transform: translateY(1px); }

    .masthead-title { text-align: center; padding: 1rem 2rem 0.85rem; }
    .magazine-name {
      font-size: clamp(1.1rem, 2.4vw, 1.7rem); font-weight: 800; letter-spacing: -0.01em;
      background: var(--gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .magazine-name span { -webkit-text-fill-color: transparent; }
    .magazine-tagline { font-size: 11px; letter-spacing: 0.04em; color: var(--ink-2); margin-top: 0.3rem; }

    .masthead-nav { border-top: 1px solid var(--border); }
    .field-tags { display: flex; overflow-x: auto; scrollbar-width: none; }
    .field-tags::-webkit-scrollbar { display: none; }
    .field-tag {
      font-size: 11px; font-weight: 500; color: var(--ink-2);
      cursor: pointer; text-decoration: none; transition: all 0.15s;
      padding: 0.7rem 1.2rem; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0;
    }
    .field-tag:hover  { color: var(--ink); background: var(--border); }
    .field-tag.active { color: var(--accent); border-bottom-color: var(--accent); }
    .field-tag:active { opacity: 0.75; }

    /* ── SKELETON ── */
    .loading-screen { display: flex; align-items: center; justify-content: center; height: 60vh; flex-direction: column; gap: 1rem; }
    .loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border-2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; letter-spacing: 0.06em; color: var(--ink-2); }
    .skeleton-screen { padding: 2rem 0; }
    .sk-block {
      background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-2) 75%);
      background-size: 200% 100%; animation: shimmer 1.6s infinite linear;
      border-radius: 6px;
    }
    @keyframes shimmer { from { background-position: 200% 0 } to { background-position: -200% 0 } }
    .sk-hero {
      display: grid; grid-template-columns: 1fr 340px;
      border: 1px solid var(--border-2); border-radius: var(--r-lg);
      overflow: hidden; margin: 2rem 0; min-height: 260px;
      background: rgba(255,255,255,0.02); backdrop-filter: blur(12px);
    }
    .sk-hero-main { padding: 2.5rem; display: flex; flex-direction: column; gap: 1rem; border-right: 1px solid var(--border); }
    .sk-hero-side  { padding: 2rem;   display: flex; flex-direction: column; gap: 1.2rem; }
    .sk-line    { height: 14px; }
    .sk-line-lg { height: 26px; }
    .sk-line-sm { height: 10px; }
    .sk-w-80    { width: 80%; }
    .sk-w-60    { width: 60%; }
    .sk-w-40    { width: 40%; }
    .sk-grid    { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
    .sk-card    {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: var(--r); padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.8rem; min-height: 180px;
    }

    /* ── HERO ── */
    .hero {
      display: grid; grid-template-columns: 1fr 340px;
      border: 1px solid var(--border-2); border-radius: var(--r-lg);
      overflow: hidden; margin: 2rem 0;
      background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
      animation: fadeUp 0.5s ease both;
    }
    .hero-main    { padding: 3rem; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 1rem; }
    .hero-sidebar { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .hero-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      background: var(--gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: inline-block; width: fit-content;
    }
    .hero-title {
      font-size: clamp(1.25rem, 2.6vw, 1.85rem);
      font-weight: 800; line-height: 1.25; letter-spacing: -0.02em; color: var(--ink);
    }
    .hero-abstract { font-size: 13.5px; line-height: 1.72; color: var(--ink-2); }
    .hero-link {
      font-size: 12px; font-weight: 600; color: var(--accent);
      text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem;
      transition: gap 0.15s;
    }
    .hero-link:hover { gap: 0.55rem; }
    .hero-meta    { font-size: 11px; color: var(--ink-2); margin-top: auto; }
    .hero-authors { font-size: 11px; color: var(--ink-3); }
    .hero-date    { font-size: 11px; color: var(--ink-3); }

    /* ── INSIGHT SIDEBAR ── */
    .insight-card  { background: rgba(167,139,250,0.05); border-radius: var(--r-sm); padding: 0.8rem 1rem; border-left: 2px solid var(--accent); transition: border-color 0.15s; }
    .insight-card:hover { border-left-color: var(--accent-2); }
    .insight-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.3rem; }
    .insight-desc  { font-size: 12px; line-height: 1.6; color: var(--ink-2); }
    .insight-num   { font-size: 1.4rem; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
    .insight-text  { font-size: 11px; color: var(--ink-2); margin-top: 0.15rem; }
    .insight-point { font-size: 12px; color: var(--ink-2); line-height: 1.55; padding-left: 0.8rem; position: relative; }
    .insight-point::before { content: "·"; position: absolute; left: 0; color: var(--accent); }
    .insight-points { display: flex; flex-direction: column; gap: 0.4rem; }
    .insights-grid  { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.8rem; }
    .insights-strip { margin: 0 0 1.5rem; }
    .sidebar-insight { background: rgba(255,255,255,0.03); border-radius: var(--r-sm); padding: 0.8rem; border: 1px solid var(--border); transition: border-color 0.15s; }
    .sidebar-insight:hover { border-color: rgba(167,139,250,0.25); }

    /* ── WIDGET / TRENDS ── */
    .widget       { margin-bottom: 2rem; }
    .widget-title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); margin-bottom: 1rem; }
    .trend-list   { display: flex; flex-direction: column; gap: 0.3rem; }
    .trends-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin: 2rem 0; }
    .trend-item   {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.6rem 0.8rem; border-radius: var(--r-sm); cursor: pointer; transition: background 0.12s;
    }
    .trend-item:hover { background: var(--border); }
    .trend-rank   { font-size: 10px; font-weight: 700; color: var(--accent); min-width: 1.2rem; margin-top: 2px; flex-shrink: 0; }
    .trend-title  { font-size: 12px; line-height: 1.5; color: var(--ink-2); }
    .trend-item:hover .trend-title { color: var(--ink); }
    .trend-meta   { font-size: 10px; color: var(--ink-3); margin-top: 0.2rem; }
    .trend-excerpt { font-size: 11px; color: var(--ink-3); margin-top: 0.15rem; line-height: 1.45; }
    .trend-arxiv-id { font-family: var(--mono); font-size: 9.5px; color: var(--ink-3); }
    .topic-list   { display: flex; flex-direction: column; gap: 0.25rem; }
    .topic-item   { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.7rem; border-radius: var(--r-sm); cursor: pointer; transition: background 0.12s; }
    .topic-item:hover { background: var(--border); }
    .topic-name   { font-size: 12px; color: var(--ink-2); }
    .topic-item:hover .topic-name { color: var(--ink); }
    .topic-count  { font-size: 10px; font-family: var(--mono); color: var(--accent); }

    /* ── PAPER GRID ── */
    .paper-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 3rem; }
    .paper-card {
      background: rgba(255,255,255,0.03); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 1.5rem; display: flex; flex-direction: column; gap: 0.55rem;
      cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .paper-card:hover { transform: translateY(-3px); border-color: rgba(167,139,250,0.28); box-shadow: 0 8px 30px rgba(167,139,250,0.10); }
    .paper-card:active { transform: translateY(0); opacity: 0.9; }
    .paper-number { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 0.08em; }
    .paper-cat    { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 4px; background: var(--accent-lt); color: var(--accent); display: inline-block; width: fit-content; }
    .paper-categories { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .paper-title  { font-size: 13.5px; font-weight: 700; line-height: 1.45; letter-spacing: -0.01em; color: var(--ink); flex: 1; }
    .paper-abstract { font-size: 12px; line-height: 1.65; color: var(--ink-2); }
    .paper-authors { font-size: 10.5px; color: var(--ink-3); }
    .paper-date   { font-size: 10px; color: var(--ink-3); }
    .paper-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 0.6rem; border-top: 1px solid var(--border); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .paper-card:nth-child(1){animation-delay:.00s} .paper-card:nth-child(2){animation-delay:.05s}
    .paper-card:nth-child(3){animation-delay:.10s} .paper-card:nth-child(4){animation-delay:.15s}
    .paper-card:nth-child(5){animation-delay:.20s} .paper-card:nth-child(6){animation-delay:.25s}
    .paper-card:nth-child(7){animation-delay:.30s} .paper-card:nth-child(8){animation-delay:.35s}

    /* ── SECTIONS ── */
    .section { padding: 2rem 0; }
    .section-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.5rem; }
    .section-title  { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); flex: 1; }
    .section-count  { font-size: 10px; font-family: var(--mono); color: var(--ink-3); }
    .stat-ml { font-family: var(--mono); font-size: 9px; color: var(--ink-3); }
    .pullquote { border-left: 3px solid var(--accent); padding: 0.8rem 1.2rem; margin: 1.5rem 0; background: var(--accent-lt); border-radius: 0 var(--r-sm) var(--r-sm) 0; }
    .pullquote-text { font-size: 13px; line-height: 1.65; color: var(--ink); font-style: italic; }
    .error-state { text-align: center; padding: 4rem 2rem; color: var(--ink-2); }
    .error-state h3 { font-size: 1.2rem; font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; }

    /* ── CATEGORY COLORS ── */
    .alt-pe  { --c: #a78bfa; } .alt-re  { --c: #60a5fa; }
    .alt-inf { --c: #34d399; } .alt-hf  { --c: #fb923c; } .alt-vc  { --c: #f472b6; }
    .cs-ai   { --c: #a78bfa; } .cs-cl   { --c: #60a5fa; }
    .cs-cv   { --c: #34d399; } .cs-lg   { --c: #fb923c; } .cs-ro   { --c: #f472b6; }
    .field-tag--alt.active, .field-tag--alt:hover { color: var(--c, var(--accent)); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(9,9,15,0.80); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 2rem;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-2); border: 1px solid var(--border-2);
      border-radius: var(--r-lg); max-width: 700px; width: 100%;
      max-height: 88vh; overflow-y: auto; padding: 2.5rem;
      position: relative; box-shadow: 0 24px 80px rgba(0,0,0,0.55);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-close {
      position: absolute; top: 1.2rem; right: 1.2rem;
      background: var(--border); border: 1px solid var(--border-2);
      border-radius: 50%; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--ink-2); cursor: pointer; transition: all 0.15s;
    }
    .modal-close:hover { background: var(--accent-lt); color: var(--accent); border-color: var(--accent); }
    .modal-header  { margin-bottom: 1.2rem; }
    .modal-label   {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: block; margin-bottom: 0.6rem;
    }
    .modal-title   { font-size: 1.4rem; font-weight: 800; line-height: 1.3; letter-spacing: -0.02em; color: var(--ink); }
    .modal-body    { font-size: 13.5px; }
    .modal-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); margin: 1.5rem 0 0.5rem; }
    .modal-abstract { font-size: 13.5px; line-height: 1.78; color: var(--ink-2); }
    .modal-meta    { display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 1rem 0; }
    .modal-meta-item { display: flex; flex-direction: column; gap: 0.15rem; }
    .modal-meta-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
    .modal-meta-value { font-size: 12px; color: var(--ink); }
    .modal-actions { display: flex; gap: 0.8rem; margin-top: 1.8rem; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem; border-radius: var(--r-sm);
      font-size: 12px; font-weight: 600; text-decoration: none; cursor: pointer; border: none;
      background: var(--gradient); color: #fff;
      transition: opacity 0.15s, transform 0.12s, box-shadow 0.15s;
      box-shadow: 0 2px 12px rgba(167,139,250,0.22);
    }
    .btn:hover  { opacity: 0.88; box-shadow: 0 4px 20px rgba(167,139,250,0.32); }
    .btn:active { transform: scale(0.97) translateY(1px); opacity: 0.82; }
    .btn-outline {
      background: transparent; color: var(--ink-2);
      border: 1px solid var(--border-2); box-shadow: none;
    }
    .btn-outline:hover { background: var(--border); color: var(--ink); box-shadow: none; opacity: 1; }

    /* ── FOOTER ── */
    .site-footer  { border-top: 1px solid var(--border); padding: 2rem 0; margin-top: 2rem; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .footer-note  { font-size: 11px; color: var(--ink-3); }
    .footer-name  { font-size: 11px; font-weight: 600; color: var(--ink-2); }
    .footer-links { display: flex; gap: 1.5rem; }

// ── CACHE (localStorage, TTL 24시간) ──────────────────────────────────────────
const CACHE_TTL = 24 * 60 * 60 * 1000; // 하루 1회 API 호출
function getCached(key) {
  try {
    const raw = localStorage.getItem('s2_' + key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem('s2_' + key); return null; }
    return data;
  } catch { return null; }
}
function getCacheAge(key) {
  try {
    const raw = localStorage.getItem('s2_' + key);
    if (!raw) return null;
    const { ts } = JSON.parse(raw);
    const h = Math.floor((Date.now() - ts) / 3600000);
    return h < 1 ? '방금' : `${h}시간 전`;
  } catch { return null; }
}
function setCache(key, data) {
  try { localStorage.setItem('s2_' + key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

  // 캐시 확인 (24시간 TTL — 하루 1회만 API 호출)
  const cacheKey = filterCat;
  const cached = getCached(cacheKey);
  if (cached) {
    console.log(`[S2] 캐시 hit: ${filterCat} (${getCacheAge(cacheKey)} 업데이트)`);
    return cached;
  }

  // 대체투자 카테고리면 전용 쿼리 사용
  const isAlt = filterCat.startsWith('alt.');
  const queries = filterCat === 'all'
    ? SEARCH_QUERIES
    : isAlt
      ? (ALT_META[filterCat]?.queries || ALT_QUERIES)
      : [filterCat.replace('cs.', '')];

  const delay = (ms) => new Promise(r => setTimeout(r, ms));

  // 순차 호출 (Rate limit 방지 — 쿼리당 2초 간격, 최대 2개만)
  const results = [];
  const queryList = queries.slice(0, 2);
  for (let i = 0; i < queryList.length; i++) {
    if (i > 0) await delay(2000);
    const q = queryList[i];
    const url = `${S2_BASE}/paper/search?query=${encodeURIComponent(q)}&fields=${S2_FIELDS}&limit=15`;
    try {
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (res.status === 429) {
        console.warn(`[S2] Rate limit (429) — 이후 쿼리 중단`);
        break;
      }
      if (!res.ok) { console.warn(`[S2] ${res.status} for: "${q}"`); continue; }
      const data = await res.json();
      console.log(`[S2] "${q}" → ${(data.data || []).length}건`);
      results.push(...(data.data || []));
    } catch (e) {
      console.warn(`[S2] fetch 실패: ${e.message}`);
    }
  }

  // 중복 제거 + 최신순 정렬
  const seen = new Set();
  const papers = results
    .filter(p => {
      if (!p.title || !p.paperId) return false;
      if (seen.has(p.paperId)) return false;
      seen.add(p.paperId);
      return true;
    })
    .sort((a, b) => {
      const da = a.publicationDate || (a.year ? `${a.year}-01-01` : '1900-01-01');
      const db = b.publicationDate || (b.year ? `${b.year}-01-01` : '1900-01-01');
      return db.localeCompare(da);
    })
    .slice(0, maxResults);

  const mapped = papers.map(mapS2Paper);
  if (mapped.length > 0) setCache(cacheKey, mapped); // 결과 있을 때만 캐시
  return mapped;
}

function mapS2Paper(p, forceCat = null) {
  const arxivId = p.externalIds?.ArXiv;
  const id = arxivId || p.paperId || 'unknown';

  // 분야 → arXiv 카테고리 유사 매핑
  const fieldMap = {
    'Computer Science': 'cs.AI',
    'Machine Learning': 'cs.LG',
    'Computer Vision': 'cs.CV',
    'Natural Language Processing': 'cs.CL',
    'Robotics': 'cs.RO',
    'Artificial Intelligence': 'cs.AI',
    // 대체투자 분야 매핑
    'Economics': 'alt.PE',
    'Finance': 'alt.HF',
    'Business': 'alt.PE',
  };
  const cats = (p.fieldsOfStudy || [])
    .map(f => fieldMap[f] || f)
    .filter(Boolean);
  if (!cats.length) cats.push('cs.AI');

  const authors = (p.authors || []).map(a => a.name).filter(Boolean);

  return {
    id,
    title: p.title.replace(/\s+/g, ' '),
    abstract: (p.abstract || '').replace(/\s+/g, ' '),
    authors,
    published: p.publicationDate || `${p.year || 2024}-01-01`,
    categories: cats,
    url: arxivId
      ? `https://arxiv.org/abs/${arxivId}`
      : `https://www.semanticscholar.org/paper/${p.paperId}`,
    pdfUrl: p.openAccessPdf?.url
      || (arxivId ? `https://arxiv.org/pdf/${arxivId}` : null),
  };
}

// ── INSIGHTS GENERATOR ────────────────────────────────────────────────────────
function generateInsights(paper) {
  const text = (paper.title + ' ' + paper.abstract).toLowerCase();
  const insights = [];

  if (text.includes('llm') || text.includes('language model') || text.includes('transformer'))
    insights.push('Leverages large language model architecture for improved generalization and few-shot capability.');
  if (text.includes('diffusion') || text.includes('generative') || text.includes('generation'))
    insights.push('Uses generative modeling to synthesize high-quality outputs — pushing the state of the art in creative AI.');
  if (text.includes('reinforcement') || text.includes('reward') || text.includes('policy'))
    insights.push('Applies reinforcement learning to optimize sequential decision-making, with implications for robotics and game AI.');
  if (text.includes('benchmark') || text.includes('evaluation') || text.includes('dataset'))
    insights.push('Introduces a new benchmark or evaluation methodology — a key contribution for measuring real-world AI progress.');
  if (text.includes('efficient') || text.includes('faster') || text.includes('compres') || text.includes('prune'))
    insights.push('Proposes efficiency improvements that reduce computational cost — critical for deployment at scale.');
  if (text.includes('multimodal') || text.includes('vision') || text.includes('image'))
    insights.push('Bridges visual and language modalities, part of the broader push toward multimodal foundation models.');
  if (text.includes('agent') || text.includes('planning') || text.includes('reasoning'))
    insights.push('Addresses autonomous agents and reasoning — a frontier area with high potential for real-world automation.');
  if (text.includes('safety') || text.includes('align') || text.includes('harmful') || text.includes('bias'))
    insights.push('Tackles AI safety and alignment — one of the most critical unsolved challenges in deploying powerful AI systems.');
  if (text.includes('graph') || text.includes('knowledge'))
    insights.push('Uses graph-based representations to model structured relationships, enabling richer reasoning over complex domains.');
  if (text.includes('medical') || text.includes('clinical') || text.includes('health'))
    insights.push('Applies AI to healthcare — a high-impact domain where research breakthroughs can translate to life-saving applications.');

  if (insights.length < 2) {
    insights.push('Introduces novel methodology with significant potential for advancing the state of the art.');
    insights.push('The experimental results demonstrate competitive performance across multiple established benchmarks.');
  }

  return insights.slice(0, 3);
}

  return cats.slice(0, 3).map(c => {
    const m = CAT_META[c] || { label: c.split('.').pop(), color: '' };
    return `<span class="paper-cat ${m.color}">${m.label}</span>`;
  }).join('');
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatAuthors(authors) {
  if (!authors.length) return 'Unknown';
  if (authors.length === 1) return authors[0];
  if (authors.length === 2) return authors.join(' & ');
  return `${authors[0]} et al.`;
}

function truncate(text, len = 200) {
  if (text.length <= len) return text;
  return text.slice(0, len).replace(/\s\S*$/, '') + '…';
}

              <div style="font-size:13px;font-weight:700;color:${k === cat ? m.color : 'var(--ink)'};">${m.title.split(' ')[0]}</div>
              <div style="font-size:11px;color:var(--ink-light);margin-top:.2rem">${m.title.split(' ').slice(1).join(' ')}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      <div class="container">
        <div class="footer-inner">
          <div class="footer-name">대체투자 <span>인사이트</span></div>
          <p class="footer-note">학술 논문 데이터를 기반으로 한 대체투자 리서치 매거진입니다. 투자 결정의 최종 책임은 투자자에게 있습니다.</p>
          <div class="footer-links">
            <a class="footer-link" href="#" onclick="filterByCat('alt.PE');return false">사모펀드</a>
            <a class="footer-link" href="#" onclick="filterByCat('alt.RE');return false">부동산</a>
            <a class="footer-link" href="#" onclick="filterByCat('alt.INF');return false">인프라</a>
            <a class="footer-link" href="#" onclick="filterByCat('alt.HF');return false">헤지펀드</a>
            <a class="footer-link" href="#" onclick="filterByCat('alt.VC');return false">벤처캐피탈</a>
          </div>
        </div>
      </div>
    </footer>
  `;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const paper = allPapers[idx];
  if (!paper) return;

  document.getElementById('modal-label').textContent = paper.categories[0] || 'Research Paper';
  document.getElementById('modal-title').textContent = paper.title;
  document.getElementById('modal-abstract').textContent = paper.abstract;
  document.getElementById('modal-arxiv-link').href = paper.url;

  const insights = generateInsights(paper);
  document.getElementById('modal-insights').innerHTML = insights
    .map(i => `<li class="insight-point">${i}</li>`).join('');

  document.getElementById('modal-meta').innerHTML = `
    <div class="modal-meta-item">
      <span class="modal-meta-label">Authors</span>
      <span class="modal-meta-value">${formatAuthors(paper.authors)}</span>
    </div>
    <div class="modal-meta-item">
      <span class="modal-meta-label">Published</span>
      <span class="modal-meta-value">${formatDate(paper.published)}</span>
    </div>
    <div class="modal-meta-item">
      <span class="modal-meta-label">arXiv ID</span>
      <span class="modal-meta-value" style="font-family:var(--mono)">${paper.id.split('v')[0]}</span>
    </div>
    <div class="modal-meta-item">
      <span class="modal-meta-label">Categories</span>
      <span class="modal-meta-value">${paper.categories.slice(0, 4).join(', ')}</span>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── FILTER ────────────────────────────────────────────────────────────────────
async function filterByCat(cat) {
  // nav active state 동기화
  document.querySelectorAll('.field-tag').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });

  const labelMap = { 'all': '전체', ...Object.fromEntries(Object.entries(ALT_META).map(([k,v])=>[k,v.title.split(' ')[0]])) };
  const label = CAT_META[cat]?.label || labelMap[cat] || cat;

  document.getElementById('app').innerHTML = `
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">${label} 논문 검색 중... (최대 5초 소요)</div>
    </div>`;
  try {
    const papers = await fetchPapers(cat, 30);
    allPapers = papers;
    if (papers.length) {
      render(papers, cat);
    } else if (isAltCat(cat)) {
      renderFallback(cat);
    } else {
      render([], cat);
    }
  } catch (err) {
    console.warn('[S2] filterByCat error:', err.message);
    if (isAltCat(cat)) renderFallback(cat);
    else render([], cat);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener('click', e => {
  const tag = e.target.closest('.field-tag');
  if (!tag) return;
  e.preventDefault();
  document.querySelectorAll('.field-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  filterByCat(tag.dataset.cat);
});

// ── FALLBACK: API 실패 시 정적 인사이트 렌더링 ────────────────────────────────
function renderFallback(cat) {
  const meta = ALT_META[cat] || ALT_META['alt.PE'];
  document.getElementById('issue-info').textContent =
    `${meta.title} · 인사이트 요약`;

  document.getElementById('app').innerHTML = `
    <div class="container" style="padding-top:2rem;padding-bottom:0">
      <div style="background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border-2);border-radius:16px;padding:2.5rem;display:flex;align-items:flex-start;gap:2.5rem;flex-wrap:wrap;margin-bottom:1px">
        <div style="flex:1;min-width:260px">
          <div style="font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.9rem">대체투자 리서치</div>
          <h2 style="font-size:clamp(1.6rem,3vw,2.4rem);font-weight:800;line-height:1.18;letter-spacing:-0.02em;margin-bottom:.9rem;color:var(--ink)">${meta.icon} ${meta.title}</h2>
          <p style="font-size:15px;line-height:1.78;color:var(--ink-2);max-width:46ch">${meta.desc}</p>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;min-width:260px;align-self:stretch">
          ${meta.stats.map(s => `
            <div style="background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:12px;padding:1.2rem;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.4rem">
              <div style="font-family:var(--mono);font-size:1.4rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${s.num}</div>
              <div style="font-size:10.5px;letter-spacing:.04em;color:var(--ink-2);white-space:pre-line;line-height:1.4">${s.desc}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="container" style="padding-top:2.5rem;padding-bottom:3rem">
      <div style="display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;padding-bottom:.6rem;border-bottom:1px solid var(--rule-dark)">
        <h2 style="font-family:var(--sans);font-size:1.1rem;font-weight:700;color:var(--ink)">핵심 인사이트</h2>
        <span style="font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-left:auto;font-family:var(--mono)">API 오프라인 — 정적 콘텐츠</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem">
        ${meta.insights.map((txt, i) => `
          <div style="padding:1.5rem;background:var(--paper-warm);border:1px solid var(--rule-dark);border-top:2px solid ${meta.color};border-radius:10px">
            <div style="font-family:var(--mono);font-size:10px;color:var(--ink-light);margin-bottom:.8rem">${String(i+1).padStart(2,'0')}</div>
            <p style="font-size:14px;line-height:1.72;color:var(--ink-muted)">${txt}</p>
          </div>`).join('')}
      </div>

      <div style="margin-top:2rem;padding:1.2rem 1.5rem;background:var(--paper-warm);border:1px solid var(--rule-dark);border-radius:10px;display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
        <span style="font-size:13px;color:var(--ink-muted)">논문 데이터를 불러오지 못했습니다. Semantic Scholar API가 일시 제한 중일 수 있습니다.</span>
        <button class="btn" style="margin-left:auto;white-space:nowrap" onclick="retryLoad('${cat}')">↺ 다시 시도</button>
      </div>
    </div>`;
}

async function retryLoad(cat) {
  // 캐시 강제 삭제 후 재시도
  try { localStorage.removeItem('s2_' + cat); } catch {}
  await filterByCat(cat);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  const initCat = 'alt.PE';
  try {
    const papers = await fetchPapers(initCat, 30);
    allPapers = papers;
    if (papers.length) {
      render(papers, initCat);
    } else {
      console.warn('[S2] 논문 없음 — 정적 폴백 표시');
      renderFallback(initCat);
    }
  } catch (err) {
    console.error(err);
    renderFallback(initCat);
  }
})();
</script>
